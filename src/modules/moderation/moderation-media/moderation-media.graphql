enum E_ModerationMediaType {
    IMAGE
    VIDEO
}

enum E_ModerationMediaStatus {
    PENDING
    APPROVED
    REJECTED
}

type T_ModerationMedia {
    id: String
    isDel: Boolean
    createdAt: DateTime
    updatedAt: DateTime
    type: E_ModerationMediaType
    uploadedById: String
    uploadedBy: T_User
    ipAddress: String
    url: String
    thumbnailUrl: String
    status: E_ModerationMediaStatus
    moderatedById: String
    moderatedBy: T_User
    reason: String
    notes: [T_Note]
    entity: E_UploadEntity
    entityId: String
    tagId: String
    tag: T_Tag
    isPublished: Boolean
    moderationLogs: [T_ModerationLog]
}

input Input_QueryModerationMedia {
    id: String
    isDel: Boolean
    createdAt: DateTime
    updatedAt: DateTime
    type: E_ModerationMediaType
    uploadedById: String
    url: String
    status: E_ModerationMediaStatus
    moderatedById: String
    reason: String
    notes: [Input_Note]
    entity: E_UploadEntity
    entityId: String
    tagId: String
    isPublished: Boolean
}

input Input_CreateModerationMedia {
    type: E_ModerationMediaType!
    ipAddress: String
    url: String!
    thumbnailUrl: String
    status: E_ModerationMediaStatus
    reason: String
    notes: [Input_Note]
    entity: E_UploadEntity!
    tagId: String
    isPublished: Boolean
}

input Input_UpdateModerationMedia {
    isDel: Boolean
    type: E_ModerationMediaType
    thumbnailUrl: String
    url: String
    ipAddress: String
    status: E_ModerationMediaStatus
    reason: String
    notes: [Input_Note]
    entity: E_UploadEntity
    tagId: String
    isPublished: Boolean
}

type T_Response_ModerationMedia {
    success: Boolean
    message: String
    result: T_ModerationMedia
}

type T_ModerationMedias {
    docs: [T_ModerationMedia]
    totalDocs: Int
    limit: Int
    hasPrevPage: Boolean
    hasNextPage: Boolean
    page: Int
    totalPages: Int
    offset: Int
    prevPage: Int
    nextPage: Int
    pagingCounter: Int
    meta: JSON
}

type T_Response_ModerationMedias {
    success: Boolean
    message: String
    result: T_ModerationMedias
}
type Query {
    getModerationMedia(
        filter: Input_QueryModerationMedia!
        projection: JSON
        options: JSON
        populate: JSON
    ): T_Response_ModerationMedia!
    getModerationMedias(filter: Input_QueryModerationMedia, options: JSON): T_Response_ModerationMedias!
}

type Mutation {
    createModerationMedia(doc: Input_CreateModerationMedia!): T_Response_ModerationMedia!
    updateModerationMedia(
        filter: Input_QueryModerationMedia!
        update: Input_UpdateModerationMedia!
        options: JSON
    ): T_Response_ModerationMedia!
    approveModerationMedia(id: String!): T_Response_ModerationMedia!
    rejectModerationMedia(id: String!, reason: String!): T_Response_ModerationMedia!
    deleteModerationMedia(filter: Input_QueryModerationMedia!, options: JSON): T_Response_ModerationMedia!
}
