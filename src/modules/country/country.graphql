enum E_ContinentCode {
    AF  
    AN  
    AS  
    EU  
    NA  
    OC  
    SA
}

type T_Continent {
    code: E_ContinentCode
    name: String
}

# type T_Language {
#     code: E_LanguageCode
#     name: String
#     native: String
#     isRTL: Boolean
# }

type T_Country {
    id: String
    isDel: Boolean
    createdAt: DateTime
    updatedAt: DateTime
    name: String
    native: String
    phone: [Int]
    continent: T_Continent
    capital: String
    currency: [String]
    languages: [T_Language]
    iso2: String
    iso3: String
    partOf: String
    userAssigned: Boolean
    flag: String
    code: E_CountryCode
}

type T_Response_Country {
    success: Boolean!
    message: String
    result: T_Country
}

type T_Countries {
    docs: [T_Country]!
    totalDocs: Int!
    limit: Int!
    hasPrevPage: Boolean!
    hasNextPage: Boolean!
    page: Int!
    totalPages: Int!
    offset: Int
    prevPage: Int
    nextPage: Int
    pagingCounter: Int!
    meta: JSON
}

type T_Response_Countries {
    success: Boolean!
    message: String
    result: T_Countries
}

input Input_QueryCountry {
    id: String
    isDel: Boolean
    createdAt: DateTime
    updatedAt: DateTime
    name: String
    native: String
    phone: [Int]
    continent: Input_Continent
    capital: String
    currency: [String]
    languages: [Input_Language]
    iso2: String
    iso3: String
    partOf: String
    userAssigned: Boolean
    flag: String
    code: E_CountryCode
}

input Input_Continent {
    code: E_ContinentCode
    name: String
}

input Input_Language {
    code: E_LanguageCode
    name: String
    native: String
    isRTL: Boolean
}

input Input_QueryCountry {
    id: String
    createdAt: DateTime
    updatedAt: DateTime
    isDel: Boolean
    name: String
    native: String
    phone: [Int]
    continent: Input_Continent
    capital: String
    currency: [String]
    languages: [Input_Language]
    iso2: String
    iso3: String
    partOf: String
    userAssigned: Boolean
    flag: String
    code: E_CountryCode
}

type Query {
    getCountry(filter: Input_QueryCountry!, projection: JSON, options: JSON, populate: JSON): T_Response_Country!
    getCountries(filter: Input_QueryCountry, options: JSON): T_Response_Countries!
}
