type T_Menu {
    id: String
    isDel: Boolean
    createdAt: DateTime
    updatedAt: DateTime
    text: String
    url: String
    icon: String
    isExternal: Boolean
    parentId: String
    parent: T_Menu
    order: Int
}

input Input_QueryMenu {
    id: String
    isDel: Boolean
    createdAt: DateTime
    updatedAt: DateTime
    text: String
    url: String
    icon: String
    isExternal: Boolean
    parentId: String
    order: Int
}

input Input_CreateMenu {
    text: String!
    url: String!
    icon: String
    isExternal: Boolean
    parentId: String
    order: Int
}

input Input_UpdateMenu {
    isDel: Boolean
    text: String
    url: String
    icon: String
    isExternal: Boolean
    parentId: String
    order: Int
}

type T_Response_Menu {
    success: Boolean
    message: String
    result: T_Menu
}

type T_Menus {
    docs: [T_Menu]
    totalDocs: Int
    limit: Int
    hasPrevPage: Boolean
    hasNextPage: Boolean
    page: Int
    totalPages: Int
    offset: Int
    prevPage: Int
    nextPage: Int
    pagingCounter: Int
    meta: JSON
}

type T_Response_Menus {
    success: Boolean
    message: String
    result: T_Menus
}

type Query {
    getMenu(filter: Input_QueryMenu!, projection: JSON, options: JSON, populate: JSON): T_Response_Menu!
    getMenus(filter: Input_QueryMenu, options: JSON): T_Response_Menus!
}

type Mutation {
    createMenu(doc: Input_CreateMenu!): T_Response_Menu!
    updateMenu(filter: Input_QueryMenu!, update: Input_UpdateMenu!, options: JSON): T_Response_Menu!
    deleteMenu(filter: Input_QueryMenu!, options: JSON): T_Response_Menu!
}
