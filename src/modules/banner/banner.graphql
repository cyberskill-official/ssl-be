type T_Banner {
    id: String
    isDel: Boolean
    createdAt: DateTime
    updatedAt: DateTime
    image: String
    targetURL: String
    blogId: String
    blog: T_Blog
    destinationId: String
    destination: T_Destination
    createdById: String
    createdBy: T_User
    clickCount: Float
    isActive: Boolean
}

input Input_QueryBanner {
    id: String
    isDel: Boolean
    createdAt: DateTime
    updatedAt: DateTime
    image: String
    targetURL: String
    blogId: String
    destinationId: String
    createdById: String
    clickCount: Float
    isActive: Boolean
}

input Input_CreateBanner {
    image: String!
    targetURL: String!
    blogId: String
    destinationId: String
    isActive: Boolean
}

input Input_UpdateBanner {
    isDel: Boolean
    image: String
    targetURL: String
    blogId: String
    destinationId: String
    isActive: Boolean
}

type T_Response_Banner {
    success: Boolean
    message: String
    result: T_Banner
}

type T_Banners {
    docs: [T_Banner]
    totalDocs: Int
    limit: Int
    hasPrevPage: Boolean
    hasNextPage: Boolean
    page: Int
    totalPages: Int
    offset: Int
    prevPage: Int
    nextPage: Int
    pagingCounter: Int
    meta: JSON
}

type T_Response_Banners {
    success: Boolean
    message: String
    result: T_Banners
}

type Query {
    getBanner(filter: Input_QueryBanner!, projection: JSON, options: JSON, populate: JSON): T_Response_Banner!
    getBanners(filter: Input_QueryBanner, options: JSON): T_Response_Banners!
}

type Mutation {
    createBanner(doc: Input_CreateBanner!): T_Response_Banner!
    updateBanner(filter: Input_QueryBanner!, update: Input_UpdateBanner!, options: JSON): T_Response_Banner!
    deleteBanner(filter: Input_QueryBanner!, options: JSON): T_Response_Banner!
    clickBanner(filter: Input_QueryBanner!): T_Response_Banner!
}
