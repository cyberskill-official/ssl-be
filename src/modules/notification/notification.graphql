# --- ENUMS ---
enum E_NotificationType {
    MEDIA_LIKED
    NEW_FOLLOWER
    NEW_MESSAGE
    NEW_MEMBER_IN_YOUR_AREA_OF_INTEREST
    NEW_ANNOUNCEMENT_IN_INTEREST_AREA_OR_FOLLOWED
    FOLLOWED_PROFILE_POSTED_MEDIA
    NEW_BLOG_POST
    NEW_PODCAST
    RECEIPT_EMAIL_ONLY
    PAYMENT_ISSUE
    GUESTBOOK_POST
    PROFILE_VISIT
}

enum E_NotificationChannel {
    IN_APP
    EMAIL
}

enum E_NotificationStatus {
    QUEUED
    SENT
    READ
    DISMISSED
    FAILED
}

enum E_NotificationEntityType {
    USER
    MEDIA
    ANNOUNCEMENT
    BLOG
    PODCAST
    MESSAGE_THREAD
    GUESTBOOK_ENTRY
    PAYMENT
    EVENT
    DESTINATION
    CONVERSATION
}

enum E_NotificationAction {
    ADDED
    UPDATED
    READ
    DISMISSED
    DELETED
}

# --- TYPES ---
type T_Notification {
    id: String
    createdAt: DateTime
    updatedAt: DateTime
    type: E_NotificationType
    actorId: String
    targetId: String
    entityType: E_NotificationEntityType
    entityId: String
    title: String
    body: String
    data: JSON
    presentation: T_NotificationPresentation
    channels: [E_NotificationChannel]
    status: E_NotificationStatus
    scheduledAt: DateTime
    readAt: DateTime
    dismissedAt: DateTime
    isEmailSuppressed: Boolean
}

# Presentation payload included with NOTIFICATION_ADDED subscription (server-built, best-effort)
type T_NotificationPresentationActor {
    id: String
    displayName: String
    accountType: String
    avatarUrl: String
}

type T_NotificationRedirect {
    kind: String
    id: String
}

type T_NotificationPresentation {
    actor: T_NotificationPresentationActor
    thumbnailUrl: String
    redirect: T_NotificationRedirect
    headline: String
}

type T_Notifications {
    docs: [T_Notification]
    totalDocs: Int
    limit: Int
    hasPrevPage: Boolean
    hasNextPage: Boolean
    page: Int
    totalPages: Int
    offset: Int
    prevPage: Int
    nextPage: Int
    pagingCounter: Int
    meta: JSON
}

type T_Response_Notification {
    success: Boolean
    message: String
    result: T_Notification
}

type T_Response_Notifications {
    success: Boolean
    message: String
    result: T_Notifications
}

input Input_QueryNotification {
    id: String
    type: E_NotificationType
    actorId: String
    targetId: String
    entityType: E_NotificationEntityType
    entityId: String
    status: E_NotificationStatus
}

input Input_CreateNotification {
    type: E_NotificationType!
    actorId: String
    targetId: String!
    entityType: E_NotificationEntityType
    entityId: String
    title: String
    body: String
    data: JSON
    channels: [E_NotificationChannel]
    scheduledAt: DateTime
}

input Input_UpdateNotification {
    status: E_NotificationStatus
    readAt: DateTime
    dismissedAt: DateTime
    title: String
    body: String
    channels: [E_NotificationChannel]
}

type T_NotificationEvent {
    notificationId: String!
    type: E_NotificationType!
    action: E_NotificationAction!
    notification: T_Notification
}

type Query {
    getNotifications(filter: Input_QueryNotification, options: JSON): T_Response_Notifications!
    getNotification(filter: Input_QueryNotification): T_Response_Notification!
}

type Mutation {
    createNotification(doc: Input_CreateNotification!): T_Response_Notification!
    createNotificationWithSettings(doc: Input_CreateNotification!): T_Response_Notification!
    updateNotification(filter: Input_QueryNotification!, update: Input_UpdateNotification!): T_Response_Notification!
    deleteNotification(filter: Input_QueryNotification!): T_Response_Notification!
    markNotificationRead(filter: Input_QueryNotification!):   T_Response_Notification!
    dismissNotification(filter: Input_QueryNotification!):T_Response_Notification!
}

type Subscription {
    notificationAdded: T_Notification!
    notificationUpdated: T_Notification!
    notificationRead: T_Notification!
    notificationDismissed: T_Notification!
    notificationDeleted: T_Notification!
    notificationEvent: T_NotificationEvent!
}
