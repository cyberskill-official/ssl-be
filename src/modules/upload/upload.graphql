enum E_UploadType {
    IMAGE
    VIDEO
    AUDIO
    DOCUMENT
    OTHER
}

enum E_Entity {
    USER
    EVENT
    CONVERSATION
    CATALOGUE
    GALLERY
}

type T_Response_Upload {
    success: Boolean!
    message: String
    result: String
}

type Mutation {
    upload(
        type: E_UploadType!
        entity: E_Entity!
        entityId: String
        file: Upload!
    ): T_Response_Upload!
}
