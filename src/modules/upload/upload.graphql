enum E_UploadType {
    IMAGE
    VIDEO
    DOCUMENT
    OTHER
}

enum E_UploadModule {
    USER
    EVENT
    CONVERSATION
    CATALOGUE
}

type T_Response_Upload {
    success: Boolean!
    message: String
    result: String
}

type Mutation {
    upload(type: E_UploadType!, module: E_UploadModule!, entityId: String, file: Upload!): T_Response_Upload!
}
