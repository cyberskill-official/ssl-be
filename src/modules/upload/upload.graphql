enum E_UploadType {
    IMAGE
    VIDEO
    AUDIO
    DOCUMENT
    OTHER
}

enum E_UploadEntity {
    USER
    EVENT
    CONVERSATION
    CATALOGUE
    GALLERY
}

type T_UploadResult {
    url: String!
    moderationMediaId: String!
    status: E_ModerationMediaStatus
    entityId: String
    stubId: String
}

type T_ContactAdminUploadResult {
    url: String!
    stubId: String!
    entityId: String
}

type T_Response_Upload {
    success: Boolean!
    message: String
    result: T_UploadResult
}

type T_Response_ContactAdminUpload {
    success: Boolean!
    message: String
    result: T_ContactAdminUploadResult
}

type Mutation {
    upload(
        type: E_UploadType!
        entity: E_UploadEntity!
        entityId: String
        tagId: String
        skipModeration: Boolean
        allowGuest: Boolean
        file: Upload!
    ): T_Response_Upload!
    uploadContactAdminAttachment(stubId: String, skipModeration: Boolean, file: Upload!): T_Response_ContactAdminUpload!
}
