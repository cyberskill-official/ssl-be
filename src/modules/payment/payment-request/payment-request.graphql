type T_PaymentRequest {
    id: String!
    isDel: Boolean
    createdAt: DateTime
    updatedAt: DateTime
    gateway: String
    status: String
    paymentUrl: String
    externalOrderId: String
    gatewayResponse: JSON
    meta: JSON
}

input Input_QueryPaymentRequest {
    id: String
    isDel: Boolean
    createdAt: DateTime
    updatedAt: DateTime
    gateway: String
    status: String
    externalOrderId: String
    gatewayResponse: JSON
    meta: JSON
}

type T_Response_PaymentRequest {
    success: Boolean!
    message: String
    result: T_PaymentRequest
}
type T_PaymentRequests {
    docs: [T_PaymentRequest]
    totalDocs: Int
    limit: Int
    hasPrevPage: Boolean
    hasNextPage: Boolean
    page: Int
    totalPages: Int
    offset: Int
    prevPage: Int
    nextPage: Int
    pagingCounter: Int
    meta: JSON
}

type T_Response_PaymentRequests {
    success: Boolean!
    message: String
    result: T_PaymentRequests
}

extend type Query {
    getPaymentRequest(filter: Input_QueryPaymentRequest!, projection: JSON, options: JSON, populate: JSON): T_Response_PaymentRequest!
    getPaymentRequests(filter:  Input_QueryPaymentRequest!, options: JSON): T_Response_PaymentRequests!
}

extend type Mutation {
    # PaymentRequest mutations are intentionally omitted to make PaymentRequest read-only
    # Creation and updates should be performed by internal payment handlers only.
}
