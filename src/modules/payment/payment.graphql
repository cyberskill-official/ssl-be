enum E_PaymentPurpose {
    MEMBERSHIP
    EVENT_POST
}

enum E_PaymentStatus {
    PENDING
    SUCCESS
    FAILED
    CANCELED
    REFUNDED
}   

enum E_PaymentMethod {
    CARD
    WALLET
    TOKEN
}

type T_Payment {
    orderId: String
    amount: Float
    currencyCode: String
    paymentMethod: E_PaymentMethod
    paymentStatus: E_PaymentStatus
    pricingId: String
}

input Input_QueryMakePayment {
    cardName: String!
    cardNumber: String!
    cardExpiryMonth: String!
    cardExpiryYear: String!
    cardCvc: String!
    amount: Float!
    pricingId: String!
    paymentType: E_PaymentMethod!
    clientOrderId: String
}

type T_Response_MakePayment {
    success: Boolean!
    message: String
    result: T_Payment
}

extend type Mutation {
    makePayment(input: Input_QueryMakePayment!): T_Response_MakePayment!
}
