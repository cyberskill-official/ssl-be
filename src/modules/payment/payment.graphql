enum E_PaymentPurpose {
    MEMBERSHIP
    EVENT_POST
}

enum E_NetvalvePaymentType {
    CARD
    WALLET
    TOKEN
    APPLE_PAY
    GOOGLE_PAY
}

input Input_MakePayment {
    amount: Float
    currency: String
    clientOrderId: String!
    successUrl: String
    cancelUrl: String
    failedUrl: String
    pendingUrl: String
    orderDesc: String
    midId: String
    customerDetails: JSON
    taxStateId: String
    taxCountryId: String
    paymentPurpose: E_PaymentPurpose
    paymentType: E_NetvalvePaymentType
    token: String
    eventPayload: JSON
}

enum E_PaymentResultStatus {
    PENDING
    PAID
    FAILED
}

type T_MakePaymentResult {
    status: E_PaymentResultStatus
    redirectUrl: String
    externalOrderId: String
    event: T_Event
    membershipExpiresAt: DateTime
    gatewayResponse: JSON
}

type T_Response_MakePayment {
    success: Boolean!
    message: String
    result: T_MakePaymentResult
}

extend type Mutation {
    makePayment(input: Input_MakePayment!): T_Response_MakePayment!
}
