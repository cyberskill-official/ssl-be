
type T_TimeZone {
    zoneName: String
    gmtOffset: Float
    gmtOffsetName: String
    abbreviation: String
    tzName: String
}

input Input_TimeZone {
    zoneName: String
    gmtOffset: Float
    gmtOffsetName: String
    abbreviation: String
    tzName: String
}

type T_Country {
    id: String
    isDel: Boolean
    createdAt: DateTime
    updatedAt: DateTime
    name: String
    slug: String
    iso2: String
    iso3: String
    numeric_code: String
    phonecode: String
    capital: String
    currency: String
    currency_name: String
    currency_symbol: String
    tld: String
    native: String
    regionId: String
    region: T_Region
    subRegionId: String
    subRegion: T_SubRegion
    nationality: String
    timezones: [T_TimeZone]
    latitude: String
    longitude: String
    emoji: String
    emojiU: String
}

