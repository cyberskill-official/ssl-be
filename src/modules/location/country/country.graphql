type T_Response_Country {
    success: Boolean
    message: String
    result: T_Country
}

type T_Countries {
    docs: [T_Country]
    totalDocs: Int
    limit: Int
    hasPrevPage: Boolean
    hasNextPage: Boolean
    page: Int
    totalPages: Int
    offset: Int
    prevPage: Int
    nextPage: Int
    pagingCounter: Int
    meta: JSON
}

type T_Response_Countries {
    success: Boolean
    message: String
    result: T_Countries
}

type Query {
    getCountry(filter: Input_QueryCountry!, projection: JSON, options: JSON, populate: JSON): T_Response_Country!
    getCountries(filter: Input_QueryCountry, options: JSON): T_Response_Countries!
}
