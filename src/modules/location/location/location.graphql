input Input_Location {
    regionId: String
    subRegionId: String
    countryId: String
    stateId: String
    cityId: String
    coordinates: Input_Coordinates
    address: String
    raw: JSON
}

input Input_Coordinates {
    latitude: Float!
    longitude: Float!
}