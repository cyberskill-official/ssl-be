type T_Map {
    latitude: Float
    longitude: Float
    zoomLevel: Int
    entity: E_Entity
}

input Input_Map {
    latitude: Float!
    longitude: Float!
    zoomLevel: Int
}

type T_Location {
    regionId: String
    region: T_Region
    subRegionId: String
