type T_Coordinates {
    latitude: Float!
    longitude: Float!
}

type T_Location {
    regionId: String
    region: T_Region
    subRegionId: String
    subRegion: T_SubRegion
    countryId: String
    country: T_Country
    stateId: String
    state: T_State
    cityId: String
