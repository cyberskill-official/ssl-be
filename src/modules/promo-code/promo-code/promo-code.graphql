input Input_QueryPromoCode {
    id: String
    isDel: Boolean
    createdAt: DateTime
    updatedAt: DateTime
    code: String
    expiresAt: DateTime
    isActive: Boolean
    isLimit: Boolean
    usageLimit: Int
    globalUsageLimit: Int
}

input Input_CreatePromoCode {
    code: String!
    expiresAt: DateTime!
    isActive: Boolean
    isLimit: Boolean
    usageLimit: Int
    globalUsageLimit: Int
    membershipDurationDays: Int
}

input Input_UpdatePromoCode {
    isDel: Boolean
    code: String
    expiresAt: DateTime
    isActive: Boolean
    isLimit: Boolean
    usageLimit: Int
    globalUsageLimit: Int
    membershipDurationDays: Int
}

type T_PromoCode {
    id: String
    isDel: Boolean
    createdAt: DateTime
    updatedAt: DateTime
    code: String
    expiresAt: DateTime
    isActive: Boolean
    isLimit: Boolean
    usageLimit: Int
    globalUsageLimit: Int
    membershipDurationDays: Int
}

type T_PromoCodes {
    docs: [T_PromoCode]
    totalDocs: Int
    limit: Int
    hasPrevPage: Boolean
    hasNextPage: Boolean
    page: Int
    totalPages: Int
    offset: Int
    prevPage: Int
    nextPage: Int
    pagingCounter: Int
    meta: JSON
}

type T_Response_PromoCode {
    success: Boolean
    message: String
    result: T_PromoCode
}

type T_Response_PromoCodes {
    success: Boolean
    message: String
    result: T_PromoCodes
}

type Query {
    getPromoCode(
        filter: Input_QueryPromoCode!
        projection: JSON
        options: JSON
        populate: JSON
    ): T_Response_PromoCode!
    getPromoCodes(
        filter: Input_QueryPromoCode
        options: JSON
    ): T_Response_PromoCodes!
}

type Mutation {
    createPromoCode(doc: Input_CreatePromoCode!): T_Response_PromoCode!
    updatePromoCode(
        filter: Input_QueryPromoCode!
        update: Input_UpdatePromoCode!
        options: JSON
    ): T_Response_PromoCode!
    deletePromoCode(
        filter: Input_QueryPromoCode!
        options: JSON
    ): T_Response_PromoCode!
}
