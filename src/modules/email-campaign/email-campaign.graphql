# Email Job Status from Queue Registry
type T_EmailJobStatus {
    jobId: String
    status: String
    type: String
    total: Int
    sent: Int
    failed: Int
    createdAt: DateTime
    updatedAt: DateTime
    scheduledAt: DateTime
    recipients: [String]
    failedRecipients: [String]
    meta: JSON
}

type T_Response_EmailJobStatus {
    success: Boolean
    message: String
    result: T_EmailJobStatus
}

enum E_UserGroup {
    ALL_SUBSCRIBERS
    PAID_MEMBERS
    FREE_MEMBERS
    CUSTOM_RECIPIENTS
}

type T_EmailCampaign {
    id: String
    isDel: Boolean
    createdAt: DateTime
    updatedAt: DateTime
    name: String
    subject: String
    content: String
    senderName: String
    senderEmail: String
    target: E_UserGroup
    customRecipientsIds: [String]
    customRecipients: [T_User]
    isScheduled: Boolean
    scheduledDate: DateTime
    scheduledTime: String
    recipientCount: Int
    openCount: Int
    clickCount: Int
    jobIds: [String]
    isSent: Boolean
}

input Input_QueryEmailCampaign {
    id: String
    isDel: Boolean
    createdAt: DateTime
    updatedAt: DateTime
    name: String
    subject: String
    content: String
    senderName: String
    senderEmail: String
    target: E_UserGroup
    customRecipientsIds: [String]
    isScheduled: Boolean
    scheduledDate: DateTime
    scheduledTime: String
    recipientCount: Int
    openCount: Int
    clickCount: Int
    jobIds: [String]
    isSent: Boolean
}

input Input_CreateEmailCampaign {
    name: String!
    subject: String!
    content: String!
    senderName: String!
    senderEmail: String!
    target: E_UserGroup!
    customRecipientsIds: [String]
    isScheduled: Boolean
    scheduledDate: DateTime
    scheduledTime: String
    recipientCount: Int
    openCount: Int
    clickCount: Int
}

input Input_UpdateEmailCampaign {
    isDel: Boolean
    name: String
    subject: String
    content: String
    senderName: String
    senderEmail: String
    target: E_UserGroup
    customRecipientsIds: [String]
    isScheduled: Boolean
    scheduledDate: DateTime
    scheduledTime: String
    recipientCount: Int
    openCount: Int
    clickCount: Int
    jobIds: [String]
    isSent: Boolean
}

type T_Response_EmailCampaign {
    success: Boolean
    message: String
    result: T_EmailCampaign
}

type T_EmailCampaigns {
    docs: [T_EmailCampaign]
    totalDocs: Int
    limit: Int
    hasPrevPage: Boolean
    hasNextPage: Boolean
    page: Int
    totalPages: Int
    offset: Int
    prevPage: Int
    nextPage: Int
    pagingCounter: Int
    meta: JSON
}

type T_Response_EmailCampaigns {
    success: Boolean
    message: String
    result: T_EmailCampaigns
}

type Query {
    getEmailCampaign(
        filter: Input_QueryEmailCampaign!
        projection: JSON
        options: JSON
        populate: JSON
    ): T_Response_EmailCampaign!
    getEmailCampaigns(filter: Input_QueryEmailCampaign, options: JSON): T_Response_EmailCampaigns!
    getEmailJobStatus(jobId: String!): T_Response_EmailJobStatus!
}

type Mutation {
    createEmailCampaign(doc: Input_CreateEmailCampaign!): T_Response_EmailCampaign!
    updateEmailCampaign(
        filter: Input_QueryEmailCampaign!
        update: Input_UpdateEmailCampaign!
        options: JSON
    ): T_Response_EmailCampaign!
    deleteEmailCampaign(filter: Input_QueryEmailCampaign!, options: JSON): T_Response_EmailCampaign!
    sendCampaignNow(filter: Input_QueryEmailCampaign!): T_Response_EmailCampaign!
}
