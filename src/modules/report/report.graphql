enum E_ReportType {
    KEYWORD 
    USER
}

enum E_ReportStatus {
    PENDING
    APPROVED
    CLOSED
}

type T_Report {
    id:	String
    isDel: Boolean
    createdAt: DateTime
    updatedAt: DateTime
    type: E_ReportType
    reportedByIds: [String]
    reportedBy: T_User
    targetId: String
    target: T_User
    content: String
    status: E_ReportStatus
    notes: [T_Note]
}

input Input_QueryReport {
    id: String
    isDel: Boolean
    createdAt: DateTime
    updatedAt: DateTime
    type: E_ReportType
    reportedByIds: [String]
    targetId: String
    content: String
    status: E_ReportStatus
    notes: [Input_Note]
}

input Input_CreateReport {
    type: E_ReportType!
    reportedByIds: [String]!
    targetId: String!
    content: String!
    status: E_ReportStatus!
    notes: [Input_Note]
}

input Input_UpdateReport {
    type: E_ReportType
    reportedByIds: [String]
    targetId: String
    content: String
    status: E_ReportStatus
    notes: [Input_Note]
}

type T_Response_Report {
    success: Boolean
    message: String
    result: T_Report
}

type T_Reports {
    docs: [T_Report]
    totalDocs: Int
    limit: Int
    hasPrevPage: Boolean
    hasNextPage: Boolean
    page: Int
    totalPages: Int
    offset: Int
    prevPage: Int
    nextPage: Int
    pagingCounter: Int
    meta: JSON
}

type T_Response_Reports {
    success: Boolean
    message: String
    result: T_Reports
}