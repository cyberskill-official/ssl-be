enum E_ConversationType {
    PRIVATE
    GROUP
    BLOG_COMMENT
    CLUB_COMMENT
    PROFILE_COMMENT
}

type T_Conversation {
    id: String
    isDel: Boolean
    createdAt: DateTime
    updatedAt: DateTime
    type: E_ConversationType
    name: String
    createdById: String
    createdBy: T_User
    lastMessageId: String
    lastMessage: T_Message
}