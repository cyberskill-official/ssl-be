fragment F_ConversationListContactAdmin on T_ContactAdmin {
    topic
    username
    email
    message
}

fragment F_ConversationListMessage on T_Message {
    id
    createdAt
    updatedAt
    senderId
    content {
        type
        value
        contactAdmin {
            ...F_ConversationListContactAdmin
        }
    }
}

fragment F_ConversationListRole on T_Role {
    name
    ancestorsIds
}

fragment F_ConversationListGallery on T_Gallery {
    id
    url
}

fragment F_ConversationListPartner on T_UserPartner {
    gender
    gallery {
        ...F_ConversationListGallery
    }
}

fragment F_ConversationListUser on T_User {
    id
    username
    accountType
    membershipExpiresAt
    partner1 {
        ...F_ConversationListPartner
    }
    partner2 {
        ...F_ConversationListPartner
    }
}

fragment F_ConversationListParticipant on T_Participant {
    id
    userId
    role
    lastReadMessageId
    createdAt
    user {
        ...F_ConversationListUser
    }
}

fragment F_ConversationListCreator on T_User {
    id
    username
}

fragment F_ConversationListItem on T_Conversation {
    id
    type
    name
    entityId
    createdAt
    updatedAt
    createdById
    lastMessageId
    lastMessageAt
    createdBy {
        ...F_ConversationListCreator
    }
    lastMessage {
        ...F_ConversationListMessage
    }
    participants {
        ...F_ConversationListParticipant
    }
}

query GetConversation($filter: Input_QueryConversation!, $projection: JSON, $options: JSON, $populate: JSON) {
    getConversation(filter: $filter, projection: $projection, options: $options, populate: $populate) {
        success
        message
        result {
            ...F_Conversation
            createdBy {
                ...F_ConversationListCreator
            }
            lastMessage {
                ...F_ConversationListMessage
            }
            participants {
                ...F_ConversationListParticipant
            }
        }
    }
}

query GetMyPrivateConversations($options: JSON, $search: String) {
    getMyPrivateConversations(options: $options, search: $search) {
        success
        message
        result {
            docs {
                ...F_ConversationListItem
            }
            totalDocs
            limit
            hasPrevPage
            hasNextPage
            page
            totalPages
        }
    }
}

query GetMyGroupConversations($options: JSON, $search: String) {
    getMyGroupConversations(options: $options, search: $search) {
        success
        message
        result {
            docs {
                ...F_ConversationListItem
            }
            totalDocs
            limit
            hasPrevPage
            hasNextPage
            page
            totalPages
        }
    }
}

mutation CreateGroupConversation($doc: Input_CreateGroupConversation!) {
    createGroupConversation(doc: $doc) {
        success
        message
        result {
            ...F_Conversation
        }
    }
}

mutation CreateConversation($doc: Input_CreateConversation!) {
    createConversation(doc: $doc) {
        success
        message
        result {
            ...F_Conversation
        }
    }
}

mutation DeleteConversation($filter: Input_QueryConversation!, $options: JSON) {
    deleteConversation(filter: $filter, options: $options) {
        success
        message
        result {
            ...F_Conversation
        }
    }
}

mutation DeletePrivateConversation($conversationId: String!) {
    deletePrivateConversation(conversationId: $conversationId) {
        success
        message
        result
    }
}

subscription MessageSent($input: Input_SubscribeToConversation) {
    messageSent(input: $input) {
        conversation {
            ...F_Conversation
            lastMessage {
                ...F_ConversationListMessage
            }
        }
    }
}

mutation MarkAllMessagesAsRead($conversationId: String!) {
    markAllMessagesAsRead(conversationId: $conversationId) {
        success
        message
        result {
            totalMarked
            conversation {
                ...F_Conversation
                lastMessageAt
                lastMessage {
                    ...F_Message
                }
                participants {
                    ...F_Participant
                }
            }
        }
    }
}

mutation DeleteGroupConversation($conversationId: String!) {
    deleteGroupConversation(conversationId: $conversationId) {
        success
        message
        result
    }
}

mutation ContactAdmin($input: Input_ContactAdmin!) {
    contactAdmin(input: $input) {
        success
        message
        result {
            conversationId
        }
    }
}

mutation RequestJoinConversation($eventId: String!) {
    requestJoinConversation(eventId: $eventId) {
        success
        message
        result
    }
}

mutation ApproveJoinConversation($requesterId: String!) {
    approveJoinConversation(requesterId: $requesterId) {
        success
        message
        result
    }
}

query GetEventJoinRequests {
    getEventJoinRequests {
        success
        message
        result {
            ...F_Notification
        }
    }
}
