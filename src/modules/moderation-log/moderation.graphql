enum E_Action {
    DELETE
    SUSPEND
    APPROVE
    WARN
    DEACTIVE
    CLOSE
}

type T_ModerationLog {
    id: String
    isDel: Boolean
    createdAt: DateTime
    updatedAt: DateTime
    triggeredById: String
    triggeredBy: T_User
    action: E_Action
    targetId: String
    target: T_User
    comment: String
}