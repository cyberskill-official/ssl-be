enum E_RegisterStep {
    VERIFY_EMAIL
    PERSONAL_INFO
    PREFERENCES
    MEMBERSHIP
    COMPLETE
}

# Step 1
input Input_Register {
    username: String!
    email: String!
    password: String!
    displayName: String
    accountType: E_AccountType
}

# Step 3
input Input_Register_Location {
    countryId: String!
    raw: JSON
}

input Input_Register_PersonalInfo_Partner {
    gender: E_Gender!
    dateOfBirth: DateTime!
    location: Input_Register_Location!
}

input Input_Register_Settings {
    timeFormat: E_UserSettings_TimeFormat
}

input Input_Register_PersonalInfo {
    partner1: Input_Register_PersonalInfo_Partner!
    partner2: Input_Register_PersonalInfo_Partner
    nativeLanguageId: String!
    otherLanguagesIds: [String]
    settings: Input_Register_Settings!
    pinStyle: E_PinStyle!
}

# Step 4
input Input_Register_Preferences_Partner {
    relationshipStatusIds: [String!]!
    sexualOrientationIds: [String!]!
    sexualPreferencesIds: [String!]!
    smokingHabitsIds: [String!]!
    preferredDrinksIds: [String!]!
    bodyTypeId: String!
    heightId: String!
    hairColorId: String!
    eyeColorId: String!
    skinToneId: String!
    picture: String!
    bio: String
}

input Input_Register_Preferences {
    lookingForIds: [String!]!
    profilePurposeIds: [String!]!
    willingnessToGoIds: [String!]!
    rulesOfEngagementIds: [String!]!
    partner1: Input_Register_Preferences_Partner!
    partner2: Input_Register_Preferences_Partner
}

# Step 5
enum E_MembershipType {
    FREE
    PAID
    PROMO
}

type T_Auth {
    user: T_User
    token: String
}

type T_Response_Auth {
    success: Boolean!
    message: String
    result: T_Auth
}

type Query {
    checkAuth(token: String): T_Response_Auth!
}

type Mutation {
    register(doc: Input_Register!): T_Response_Auth!
    registerSendVerifyEmail(email: String!): T_Response_Auth!
    registerVerifyEmail(email: String!, otp: String!): T_Response_Auth!
    registerPersonalInfo(update: Input_Register_PersonalInfo!): T_Response_Auth!
    registerPreferences(update: Input_Register_Preferences!): T_Response_Auth!
    registerMembership(type: E_MembershipType!, promoCode: String): T_Response_Auth!
    login(identity: String!, password: String!, rememberMe: Boolean): T_Response_Auth!
    logout: T_Response_Auth!
    forgotPasswordRequest(email: String!): T_Response_Auth!
    resetPassword(email: String!, otp: String!, newPassword: String!): T_Response_Auth!
}
