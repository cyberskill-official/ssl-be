type T_Seo {
    title: JSON
    description: JSON
    keywords: JSON
    socialImage: String
    socialMediaDescription: JSON
    urlSlug: JSON
    altTextForImages: JSON
    imageAltTexts: JSON
}

input Input_Seo {
    title: JSON
    description: JSON
    keywords: JSON
    socialImage: String
    socialMediaDescription: JSON
    urlSlug: JSON
    altTextForImages: JSON
    imageAltTexts: JSON
}

type T_HreflangLink {
    hreflang: String!
    href: String!
}

type T_StaticPageSeo {
    title: String!
    description: String!
    canonicalUrl: String!
    hreflangLinks: [T_HreflangLink]!
}

enum E_StaticPage {
    HOME
    DESTINATION
    BLOG
}

extend type Query {
    getStaticPageSeo(page: E_StaticPage!): T_StaticPageSeo
}
