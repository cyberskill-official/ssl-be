enum E_EvenType {
    BOOTY_CALL
    PRIVATE
    TRAVEL
    CLUB_VISIT
}

type T_Event {
    id: String
    createdAt: DateTime
    updatedAt: DateTime
    isDel: Boolean
    type: E_EvenType
    clubId: String
    title: String
    image: String
    description: String
    startDate: DateTime
    endDate: DateTime
    startTime: String
    endTime: String
    location: JSON
    fee: Float
    currency: String
    pushMessage: String
}