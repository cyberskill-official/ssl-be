name: 🚀 CI - Deploy
on:
  workflow_dispatch:
jobs:
  deploy:
    name: 🚀 Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5

      - name: Deploy
        uses: cyberskill-world/.github/actions/deploy@main
        with:
          HOST: ${{ vars.SSL_DEVELOPMENT_HOST }}
          USERNAME: ${{ vars.SSL_DEVELOPMENT_USERNAME }}
          PRIVATE_KEY: ${{ secrets.SSL_DEVELOPMENT_PRIVATE_KEY }}
          PATH: ssl-be
          BRANCH: ${GITHUB_REF##*/}
          NAME: ssl-be